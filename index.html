<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Tęczowy Domek</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',Arial,sans-serif;background:#F7F9FF;color:#1A2540;font-size:14px}
:root{--p:#5B8DEF;--pd:#3A6FD8;--g:#52C97B;--r:#E8526A;--a:#F4A94E;--bg:#F7F9FF;--card:#fff;--txt:#1A2540;--lt:#6B7A9B;--br:#E0E8F5}

/* TOPBAR */
.topbar{background:#fff;border-bottom:2px solid var(--br);padding:0 14px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(91,141,239,.08)}
.topbar-logo img{height:40px;width:auto}
.topbar-right{display:flex;align-items:center;gap:8px}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--p),#A855F7);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:13px;flex-shrink:0}
.user-info{text-align:right;font-size:12px;color:var(--lt)}
.user-info strong{display:block;color:var(--txt);font-size:13px}
.logout-btn{background:none;border:1px solid var(--br);border-radius:8px;padding:5px 10px;font-size:12px;color:var(--lt);cursor:pointer}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid var(--br);display:flex;z-index:100;box-shadow:0 -4px 20px rgba(91,141,239,.08)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px 10px;cursor:pointer;gap:3px;border:none;background:none;border-top:3px solid transparent}
.nav-item .ni{font-size:20px}.nav-item .nl{font-size:10px;font-weight:700;color:var(--lt)}
.nav-item.active{border-top-color:var(--p)}.nav-item.active .nl{color:var(--p)}

/* MAIN */
.main{padding:16px 16px 80px;max-width:700px;margin:0 auto}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#EEF4FF,#F7F0FF)}
.login-card{background:#fff;border-radius:24px;padding:32px 24px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(91,141,239,.15)}
.login-card h1{text-align:center;font-size:22px;font-weight:800;color:var(--p);margin-bottom:2px}
.login-card p{text-align:center;font-size:13px;color:var(--lt);margin-bottom:24px}
.user-btn{width:100%;padding:13px 14px;border-radius:14px;border:2px solid var(--br);background:var(--bg);cursor:pointer;display:flex;align-items:center;gap:12px;margin-bottom:8px;text-align:left;transition:.15s}
.user-btn:hover,.user-btn.sel{border-color:var(--p);background:#EEF4FF}
.user-btn .un{font-weight:700;font-size:14px}.user-btn .ur{font-size:12px;color:var(--lt)}
.pin-input{width:100%;padding:12px;border:2px solid var(--br);border-radius:12px;font-size:22px;letter-spacing:10px;text-align:center;font-family:monospace;margin-top:12px}
.pin-input:focus{outline:none;border-color:var(--p)}
.login-btn{width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;font-size:16px;font-weight:800;cursor:pointer;margin-top:10px;font-family:inherit}
.err{color:var(--r);font-size:13px;text-align:center;margin-top:6px}
.hint{font-size:11px;color:var(--lt);text-align:center;margin-top:8px}

/* CARDS & COMMON */
.card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(91,141,239,.06);border:1px solid var(--br);margin-bottom:14px}
.section-title{font-size:18px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.rainbow-bar{height:4px;border-radius:4px;background:linear-gradient(90deg,#FF6B9D,#F4A94E,#52C97B,#5B8DEF,#A855F7);margin-bottom:20px}

/* TABS */
.tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.tab{padding:8px 14px;border-radius:20px;border:2px solid var(--br);background:#fff;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;color:var(--lt);font-family:inherit}
.tab.active{background:var(--p);color:#fff;border-color:var(--p)}

/* FORM */
.fg{margin-bottom:12px}
.fl{display:block;font-size:12px;font-weight:700;color:var(--lt);margin-bottom:5px}
.fi,.fs{width:100%;padding:10px 12px;border:2px solid var(--br);border-radius:10px;font-size:14px;font-family:inherit;background:#fff}
.fi:focus,.fs:focus,.fta:focus{outline:none;border-color:var(--p)}
.fta{width:100%;padding:10px 12px;border:2px solid var(--br);border-radius:10px;font-size:14px;font-family:inherit;resize:vertical;min-height:76px}
.row2{display:flex;gap:10px}.row2 .fg{flex:1}

/* BUTTONS */
.btn{padding:10px 18px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.btn-p{background:var(--p);color:#fff}.btn-p:hover{background:var(--pd)}
.btn-o{background:#fff;border:2px solid var(--p);color:var(--p)}
.btn-g{background:var(--g);color:#fff}
.btn-r{background:var(--r);color:#fff}
.btn-pr{background:#F0FFF6;border:2px solid var(--g);color:#2a8855;font-size:12px;padding:6px 12px}
.btn-sm{padding:7px 13px;font-size:13px}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.full{width:100%}

/* CHILDREN */
.child-card{background:#fff;border-radius:16px;border:2px solid var(--br);padding:13px 15px;display:flex;align-items:center;gap:13px;cursor:pointer;transition:.15s;margin-bottom:9px}
.child-card:hover{border-color:var(--p);background:#F4F8FF}
.ch-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;flex-shrink:0}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;background:#EEF4FF;color:var(--p)}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;font-size:14px;font-weight:700;color:var(--p);cursor:pointer;padding:0;margin-bottom:14px;font-family:inherit}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.stat-card{background:#fff;border-radius:16px;padding:16px;border:2px solid var(--br);text-align:center}
.stat-num{font-size:32px;font-weight:800}.stat-lbl{font-size:12px;color:var(--lt);margin-top:4px}

/* LOG ENTRIES */
.log-entry{padding:10px 12px;border-left:3px solid var(--p);background:var(--bg);border-radius:0 8px 8px 0;margin-bottom:8px}
.le-date{font-size:11px;color:var(--lt);margin-bottom:3px}
.le-desc{font-size:13px;font-weight:700}
.le-act{font-size:12px;color:var(--lt);margin-top:2px}

/* OBS */
.obs-sec-hdr{background:#EEF4FF;color:var(--p);font-weight:800;font-size:11px;text-transform:uppercase;padding:7px 10px;border-radius:8px;margin:12px 0 8px}
.obs-item{margin-bottom:10px}
.obs-item-lbl{font-size:12px;font-weight:600;margin-bottom:5px}
.lvl-btns{display:flex;gap:5px;flex-wrap:wrap}
.lvl-btn{padding:4px 10px;border-radius:8px;border:2px solid var(--br);background:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:.1s}
.lvl-btn.sel-W{background:var(--g);border-color:var(--g);color:#fff}
.lvl-btn.sel-P{background:var(--a);border-color:var(--a);color:#fff}
.lvl-btn.sel-N{background:var(--r);border-color:var(--r);color:#fff}
.lvl-btn.sel-B{background:#aaa;border-color:#aaa;color:#fff}

/* CRITERIA */
.cr-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--br)}
.cr-num{font-weight:800;color:var(--p);font-size:13px;min-width:26px;padding-top:6px}
.cr-txt{flex:1;font-size:12px;padding-top:4px}
.cr-scores{display:flex;gap:5px;flex-shrink:0}
.sc-btn{width:32px;height:32px;border-radius:8px;border:2px solid var(--br);background:#fff;font-weight:800;cursor:pointer;font-size:14px;font-family:inherit}
.sc-btn.a1{background:var(--r);color:#fff;border-color:var(--r)}
.sc-btn.a2{background:var(--a);color:#fff;border-color:var(--a)}
.sc-btn.a3{background:var(--g);color:#fff;border-color:var(--g)}
.score-box{text-align:center;padding:16px;background:linear-gradient(135deg,#EEF4FF,#F0F0FF);border-radius:14px;margin-top:14px}
.score-num{font-size:40px;font-weight:800;color:var(--p)}

/* DAILY */
.daily-entry{padding:10px 12px;border:1px solid var(--br);border-radius:10px;margin-bottom:10px}
.daily-entry label{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;margin-bottom:8px;cursor:pointer}
.daily-entry input[type=checkbox]{width:18px;height:18px;accent-color:var(--p)}

/* CONFIRM MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px}
.modal{background:#fff;border-radius:20px;padding:28px;max-width:340px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.2)}

/* ACCORDION */
.acc-item{border:2px solid var(--br);border-radius:12px;margin-bottom:8px;overflow:hidden}
.acc-trigger{width:100%;padding:12px 14px;background:#fff;border:none;text-align:left;font-size:14px;font-weight:700;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-family:inherit}
.acc-trigger:hover{background:var(--bg)}
.acc-body{padding:14px;border-top:1px solid var(--br);background:var(--bg);display:none}
.acc-body.open{display:block}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--g);color:#fff;padding:12px 20px;border-radius:12px;font-weight:700;font-size:14px;z-index:1000;animation:fiu .3s}
@keyframes fiu{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--lt)}
.empty-icon{font-size:48px;margin-bottom:12px}

/* NOTIF DOT */
.ndot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--r);margin-left:3px;vertical-align:middle}

/* PRINT STYLES */
@media print{.topbar,.bottom-nav,.btn,.btn-p,.btn-o,.btn-g,.btn-r,.btn-pr,.back-btn,.no-print{display:none!important}.main{padding:0}}
</style>
</head>

function saveToSupabase(d){
  if(!sb)return;
  clearTimeout(_saveTimeout);
  _saveTimeout=setTimeout(function(){
    var payload=Object.assign({},d,{currentUser:null});
    var str=JSON.stringify(payload);
    _lastSaveStr=str; _lastSaveAt=Date.now();
    sb.from('app_state').update({data:payload,updated_at:new Date().toISOString()}).eq('id','main')
      .then(function(r){if(r.error)console.warn('Save error:',r.error.message);})
      .catch(function(e){console.warn('Save exception:',e);});
  },600);
}
function loadFromSupabase(){
  if(!sb)return Promise.resolve(null);
  return sb.from('app_state').select('data').eq('id','main').single()
    .then(function(r){
      if(r.error){console.warn('Load error:',r.error.message);return null;}
      return(r.data&&r.data.data&&Object.keys(r.data.data).length)?r.data.data:null;
    }).catch(function(e){console.warn('Load exception:',e);return null;});
}
function subscribeRealtime(){
  if(!sb)return;
  sb.channel('app_state_changes').on('postgres_changes',
    {event:'UPDATE',schema:'public',table:'app_state',filter:'id=eq.main'},
    function(payload){
      var remote=payload.new&&payload.new.data;
      if(!remote)return;
      var str=JSON.stringify(remote);
      if(str===_lastSaveStr&&(Date.now()-_lastSaveAt)<5000)return;
      applyRemote(remote);
      render();
    }).subscribe();
}

function getAgeMonths(dob){if(!dob)return 24;const d=new Date(dob),n=new Date();return(n.getFullYear()-d.getFullYear())*12+n.getMonth()-d.getMonth()}
function getSchoolYearStart(){const now=new Date();const yr=now.getMonth()>=8?now.getFullYear():now.getFullYear()-1;return new Date(yr,8,1);}
function getAgeMonthsAtSep(dob){if(!dob)return 24;const d=new Date(dob),sep=getSchoolYearStart();return(sep.getFullYear()-d.getFullYear())*12+sep.getMonth()-d.getMonth();}
function getAgeGroup(dob){if(!dob)return'19-24';const m=getAgeMonthsAtSep(dob);if(m<=18)return'12-18';if(m<=24)return'19-24';return'25-36';}
function getSchoolYearLabel(){const sep=getSchoolYearStart();return sep.getFullYear()+'/'+(sep.getFullYear()+1);}
function getAge(dob){if(!dob)return'—';const m=getAgeMonths(dob);if(m<12)return m+' m-c';return Math.floor(m/12)+' l. '+(m%12)+' m-c'}

}

let _toastTimer;
function showToast(msg){
  let t=document.querySelector('.toast');
  if(t)t.remove();
  t=el('div',{class:'toast'},'✅ '+msg);
  document.body.appendChild(t);
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>t&&t.remove(),2500);
}

function el(tag,attrs,inner){
  attrs=attrs||{};inner=inner||'';
  var e=document.createElement(tag);
  var keys=Object.keys(attrs);
  for(var i=0;i<keys.length;i++){
    var k=keys[i],v=attrs[k];
    if(k==='class')e.className=v;
    else if(k.substr(0,2)==='on')e[k]=v;
    else e.setAttribute(k,v);
  }
  if(typeof inner==='string')e.innerHTML=inner;
  else if(inner&&inner.nodeType)e.appendChild(inner);
  return e;
}

function renderLogin(app){
  let selUser=null, pin='';
  const wrap=el('div',{class:'login-wrap'});
  const card=el('div',{class:'login-card'});
  const logoEl=el('div',{style:'text-align:center;margin-bottom:8px'});
  logoEl.innerHTML='<img src="'+LOGO+'" style="height:80px;width:auto"/>';
  card.appendChild(logoEl);

  card.appendChild(el('p','{}','System zarządzania żłobkiem'));
  const userList=el('div',{});
  S.users.forEach(u=>{
    const b=el('button',{class:'user-btn'});
    const av=el('div',{class:'avatar'},u.name[0]);
    const info=el('div',{});
    info.appendChild(el('div',{class:'un'},u.name));
    info.appendChild(el('div',{class:'ur'},u.role==='admin'?'Dyrektor':'🌸 Opiekunka · '+u.group));
    b.appendChild(av);b.appendChild(info);
    b.onclick=()=>{
      selUser=u;
      wrap.querySelectorAll('.user-btn').forEach(x=>x.classList.remove('sel'));
      b.classList.add('sel');
      pinInput.focus();
    };
    userList.appendChild(b);
  });
  card.appendChild(userList);
  const pinInput=el('input',{class:'pin-input',type:'password',maxlength:'4',placeholder:'PIN'});
  pinInput.oninput=()=>pin=pinInput.value;
  pinInput.onkeydown=e=>{if(e.key==='Enter')doLogin()};
  card.appendChild(pinInput);
  const lBtn=el('button',{class:'login-btn'},'Zaloguj się');
  lBtn.onclick=doLogin;
  card.appendChild(lBtn);
  const errEl=el('div',{class:'err'});
  card.appendChild(errEl);
  card.appendChild(el('div',{class:'hint'},'Demo: Dyrektor=1234 · Op.1=1111 · Op.2=2222 · Op.3=3333 · Op.4=4444 · Op.5=5555'));
  wrap.appendChild(card);
  app.appendChild(wrap);
  function doLogin(){
    if(!selUser){errEl.textContent='Wybierz użytkownika';return;}
    if(selUser.pin!==pin){errEl.textContent='Błędny PIN';pinInput.value='';pin='';return;}
    setState({currentUser:selUser});
    render();
  }
}

function renderObsForm(main, child){
  const back=el('button',{class:'back-btn'},'← Wróć do listy');

  const card=el('div',{class:'card'});

  card.appendChild(inp('Data obserwacji',obsFormData.date,(v)=>obsFormData.date=v,{type:'date'}));
  ag.sections.forEach((sec,si)=>{
    card.appendChild(el('div',{class:'obs-sec-hdr'},sec.name));
    sec.items.forEach((item,ii)=>{
      const wrap=el('div',{class:'obs-item'});
      wrap.appendChild(el('div',{class:'obs-item-lbl'},(ii+1)+'. '+item));
      const btns=el('div',{class:'lvl-btns'});
      LEVELS.forEach(lv=>{
        const key=si+'_'+ii, lk=LEVEL_KEY[lv];
        const b=el('button',{class:'lvl-btn'+(obsFormData.scores[key]===lv?' sel-'+lk:'')},lv);
        b.onclick=()=>{
          obsFormData.scores[key]=lv;
          // update button styles
          btns.querySelectorAll('.lvl-btn').forEach(x=>x.className='lvl-btn');
          b.className='lvl-btn sel-'+lk;
        };
        btns.appendChild(b);
      });
      wrap.appendChild(btns);
      card.appendChild(wrap);
    });
  });
  card.appendChild(textarea('Uwagi',obsFormData.notes,(v)=>obsFormData.notes=v));
  const row=el('div',{class:'btn-row'});
  row.appendChild(btn('💾 Zapisz obserwację','btn-p',function(){
    if(obsEditId){
      setState(function(s){const list=(s.observations[child.id]||[]).map(function(o){return o.id===obsEditId?Object.assign({},o,obsFormData,{id:obsEditId}):o;});setLog("observations",child.id,list);return S;});
      showToast('Obserwacja zaktualizowana');
    }else{
      const newObs={id:uid(),...obsFormData,schoolYear:getSchoolYearLabel()};

    }
    obsFormActive=false;obsEditId=null;render();
  }));
  row.appendChild(btn('Anuluj','btn-o',function(){obsFormActive=false;obsEditId=null;render();}));
  card.appendChild(row);
  main.appendChild(card);
}

function buildCriteriaForm(container, emp){
  let scores={}, evalDate=today();
  container.appendChild(el('div',{style:'font-size:12px;color:var(--lt);margin-bottom:12px'},'Skala: 1 = nie spełnia | 2 = spełnia częściowo | 3 = spełnia w pełni'));
  const dateWrap=inp('Data oceny',evalDate,(v)=>evalDate=v,{type:'date'});
  container.appendChild(dateWrap);
  const scoreDisplay=el('div',{class:'score-box'});
  scoreDisplay.innerHTML='<div class="score-num">0</div><div style="font-size:13px;color:var(--lt)">punktów</div><div style="font-weight:700;margin-top:4px">Ocena: —</div><div style="font-size:11px;color:var(--lt);margin-top:4px">Wyróżniająca >100 · Dobra 50–100 · Negatywna <50</div>';
  function updateScore(){
    const total=Object.values(scores).reduce((a,b)=>a+b,0);
    const grade=total>100?'Wyróżniająca':total>=50?'Dobra':'Negatywna';
    const color=total>100?'var(--g)':total>=50?'var(--a)':'var(--r)';
    scoreDisplay.innerHTML='<div class="score-num" style="color:var(--p)">'+total+'</div><div style="font-size:13px;color:var(--lt)">punktów</div><div style="font-weight:700;margin-top:4px;color:'+color+'">Ocena: '+grade+'</div><div style="font-size:11px;color:var(--lt);margin-top:4px">Wyróżniająca >100 · Dobra 50–100 · Negatywna <50</div>';
  }
  CRITERIA.forEach((crit,i)=>{
    const row=el('div',{class:'cr-row'});
    row.appendChild(el('div',{class:'cr-num'},(i+1)+'.'));
    row.appendChild(el('div',{class:'cr-txt'},crit));
    const btns=el('div',{class:'cr-scores'});
    [1,2,3].forEach(n=>{
      const b=el('button',{class:'sc-btn'},String(n));
      b.onclick=()=>{
        scores[i]=n;
        btns.querySelectorAll('.sc-btn').forEach(x=>x.className='sc-btn');
        b.className='sc-btn a'+n;
        updateScore();
      };
      btns.appendChild(b);
    });
    row.appendChild(btns);
    container.appendChild(row);
  });
  container.appendChild(scoreDisplay);
  const row=el('div',{class:'btn-row'});
  row.appendChild(btn('💾 Zapisz ocenę','btn-p',()=>{
    const total=Object.values(scores).reduce((a,b)=>a+b,0);
    const grade=total>100?'Wyróżniająca':total>=50?'Dobra':'Negatywna';
    const entry={id:uid(),date:evalDate,type:'criteria',scores:Object.assign({},scores),total:total,grade:grade};
    setLog("employeeEvals",emp.id,[entry].concat(S.employeeEvals[emp.id]||[]));
    logChange('Ocena kryteriów: '+emp.name+' — '+total+' pkt ('+grade+')');
    showToast('Ocena zapisana');
  }));
  row.appendChild(btn('🖨️ Drukuj','btn-pr',()=>printCriteria(emp,scores,Object.values(scores).reduce((a,b)=>a+b,0),evalDate)));
  container.appendChild(row);
}

let logSearch='', logUserFilter='', logDateFrom='', logDateTo='';

  main.appendChild(expLogRow);
  // Filters
  const fCard=el('div',{class:'card',style:'margin-bottom:14px'});
  fCard.appendChild(el('div',{style:'font-weight:700;font-size:13px;margin-bottom:10px;color:var(--lt)'},'🔍 Filtruj'));
  const srch=el('input',{class:'fi',placeholder:'Szukaj w treści zmian...',value:logSearch,style:'margin-bottom:8px'});
  srch.oninput=()=>{logSearch=srch.value;refreshLog();};
  fCard.appendChild(srch);
  // User filter
  const userWrap=el('div',{class:'row2'});
  const uSel=el('select',{class:'fs'});
  const users=[''].concat(S.changeLog.map(function(l){return l.user;}).filter(function(v,i,a){return a.indexOf(v)===i;}));
  users.forEach(u=>{const o=el('option',{value:u},u||'Wszyscy pracownicy');if(u===logUserFilter)o.selected=true;uSel.appendChild(o);});
  uSel.onchange=()=>{logUserFilter=uSel.value;refreshLog();};
  const uWrap=el('div',{class:'fg',style:'flex:1'});
  uWrap.appendChild(el('label',{class:'fl'},'Pracownik'));uWrap.appendChild(uSel);
  // Date filters
  const dfWrap=el('div',{class:'fg',style:'flex:1'});
  dfWrap.appendChild(el('label',{class:'fl'},'Od daty'));
  const dfIn=el('input',{class:'fi',type:'date',value:logDateFrom});
  dfIn.oninput=()=>{logDateFrom=dfIn.value;refreshLog();};
  dfWrap.appendChild(dfIn);
  const dtWrap=el('div',{class:'fg',style:'flex:1'});
  dtWrap.appendChild(el('label',{class:'fl'},'Do daty'));
  const dtIn=el('input',{class:'fi',type:'date',value:logDateTo});
  dtIn.oninput=()=>{logDateTo=dtIn.value;refreshLog();};
  dtWrap.appendChild(dtIn);
  userWrap.appendChild(uWrap);userWrap.appendChild(dfWrap);userWrap.appendChild(dtWrap);
  fCard.appendChild(userWrap);
  const clearBtn=btn('✕ Wyczyść filtry','btn-o btn-sm',()=>{logSearch='';logUserFilter='';logDateFrom='';logDateTo='';render();});
  fCard.appendChild(clearBtn);
  main.appendChild(fCard);
  const listEl=el('div',{id:'log-list'});
  main.appendChild(listEl);
  refreshLog();
  function refreshLog(){
    const target=document.getElementById('log-list');
    if(!target)return;
    target.innerHTML='';
    let logs=S.changeLog;
    if(logSearch.trim()) logs=logs.filter(l=>l.action.toLowerCase().includes(logSearch.toLowerCase())||l.user.toLowerCase().includes(logSearch.toLowerCase()));
    if(logUserFilter) logs=logs.filter(l=>l.user===logUserFilter);
    if(logDateFrom) logs=logs.filter(l=>l.ts.slice(0,10)>=logDateFrom);
    if(logDateTo) logs=logs.filter(l=>l.ts.slice(0,10)<=logDateTo);
    target.appendChild(el('div',{style:'font-size:12px;color:var(--lt);margin-bottom:8px'},'Wyników: '+logs.length+' z '+S.changeLog.length));
    if(!logs.length){target.appendChild(el('div',{class:'empty'},'<div class="empty-icon">📜</div><div>Brak wyników</div>'));return;}
    logs.forEach(l=>{
      const row=el('div',{style:'padding:8px 10px;border-bottom:1px solid var(--br);font-size:13px'});
      row.innerHTML='<strong>'+l.user+'</strong> — '+l.action+'<div style="font-size:11px;color:var(--lt)">'+new Date(l.ts).toLocaleString('pl-PL')+'</div>';
      target.appendChild(row);
    });
  }
}

// ── BULLETIN BOARD ────────────────────────────────────────────────────────────
function renderBulletinBoard(main){
  var groups=isAdmin()?['Grupa 1','Grupa 2']:[S.currentUser.group];
  groups.forEach(function(grp){
    var notes=(S.groupNotes&&S.groupNotes[grp])||[];
    var card=el('div',{class:'card',style:'border-left:4px solid var(--a)'});
    var hdr=el('div',{style:'font-weight:800;font-size:15px;margin-bottom:12px'});
    hdr.textContent='📌 Tablica — '+grp;
    card.appendChild(hdr);
    var inputRow=el('div',{style:'display:flex;gap:8px;margin-bottom:12px'});
    var ni=el('input',{class:'fi',style:'flex:1;margin-bottom:0'});
    ni.placeholder='Wpisz ogłoszenie...';
    var ab=btn('➕','btn-p btn-sm',function(){
      var txt=ni.value.trim();
      if(!txt)return;
      var note={id:uid(),text:txt,author:S.currentUser.name,ts:new Date().toISOString()};
      setState(function(s){
        var gn=Object.assign({},s.groupNotes||{});
        gn[grp]=[note].concat(gn[grp]||[]);
        return Object.assign({},s,{groupNotes:gn});
      });
      logChange('Ogłoszenie ('+grp+'): '+txt.slice(0,40));
      showToast('Ogłoszenie dodane');render();
    });
    ni.onkeydown=function(e){if(e.key==='Enter')ab.click();};
    inputRow.appendChild(ni);inputRow.appendChild(ab);card.appendChild(inputRow);
    if(!notes.length){
      card.appendChild(el('div',{style:'font-size:13px;color:var(--lt);text-align:center;padding:8px'},'Brak ogłoszeń'));
    }else{
      notes.slice(0,8).forEach(function(note){
        var row=el('div',{style:'display:flex;align-items:flex-start;gap:8px;padding:9px 10px;background:#FFFAF7;border-radius:10px;margin-bottom:6px;border:1px solid var(--br)'});
        var info=el('div',{style:'flex:1'});
        info.innerHTML='<div style="font-size:13px;font-weight:700">'+note.text+'</div>'+
          '<div style="font-size:11px;color:var(--lt);margin-top:2px">'+note.author+' · '+note.ts.slice(0,10)+'</div>';
        var db=el('button',{style:'background:none;border:none;color:var(--lt);cursor:pointer;font-size:18px;padding:0;flex-shrink:0'});
        db.textContent='×';
        db.onclick=function(){
          confirmDelete('Usunąć ogłoszenie?',function(){
            setState(function(s){
              var gn=Object.assign({},s.groupNotes||{});
              gn[grp]=(gn[grp]||[]).filter(function(n){return n.id!==note.id;});
              return Object.assign({},s,{groupNotes:gn});
            });
            showToast('Usunięto');render();
          });
        };
        row.appendChild(el('div',{style:'font-size:16px;flex-shrink:0'},'📌'));
        row.appendChild(info);row.appendChild(db);
        card.appendChild(row);
      });
    }
    main.appendChild(card);
  });
}

  var MONTHS=['Styczeń','Luty','Marzec','Kwiecień','Maj','Czerwiec','Lipiec','Sierpień','Wrzesień','Październik','Listopad','Grudzień'];
  var kids=S.children.filter(function(c){return !!c.dob;});
  var upcoming=kids.filter(function(c){
    var p=c.dob.split('-');
    var b=new Date(now.getFullYear(),parseInt(p[1])-1,parseInt(p[2]));
    var diff=Math.ceil((b-now)/(86400000));
    return diff>=0&&diff<=30;
  }).length;
  var statsRow=el('div',{style:'display:flex;gap:10px;margin-bottom:18px'});
  var s1=el('div',{class:'stat-card',style:'flex:1'});
  s1.innerHTML='<div class="stat-num" style="color:var(--p)">'+kids.length+'</div><div class="stat-lbl">Dzieci z datą urodzenia</div>';
  var s2=el('div',{class:'stat-card',style:'flex:1'});
  s2.innerHTML='<div class="stat-num" style="color:var(--a)">'+upcoming+'</div><div class="stat-lbl">Urodziny w 30 dni</div>';
  statsRow.appendChild(s1);statsRow.appendChild(s2);main.appendChild(statsRow);
  var byMonth={};
  kids.forEach(function(c){
    var p=c.dob.split('-');
    var m=parseInt(p[1]),d=parseInt(p[2]);
    if(!byMonth[m])byMonth[m]={};
    if(!byMonth[m][d])byMonth[m][d]=[];
    byMonth[m][d].push(c);
  });
  var order=[];for(var i=0;i<12;i++)order.push(((mm-1+i)%12)+1);
  order.forEach(function(m){
    if(!byMonth[m])return;
    var mcard=el('div',{class:'card'});
    var mhdr=el('div',{style:'font-weight:900;font-size:16px;color:var(--p);margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid var(--br)'});
    mhdr.textContent='🗓️ '+MONTHS[m-1];
    mcard.appendChild(mhdr);
    var days=Object.keys(byMonth[m]).map(Number).sort(function(a,b){return a-b;});
    days.forEach(function(d){
      byMonth[m][d].forEach(function(c){
        var yr=parseInt(c.dob.split('-')[0]);
        var age=now.getFullYear()-yr;
        var bday=new Date(now.getFullYear(),m-1,d);
        var diff=Math.ceil((bday-now)/(86400000));
        if(diff<0){bday=new Date(now.getFullYear()+1,m-1,d);diff=Math.ceil((bday-now)/(86400000));}
        var isToday=m===mm&&d===dd;
        var isSoon=diff<=7&&diff>=0;
        var row=el('div',{style:'display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;margin-bottom:6px;background:'+(isToday?'#FFF8E1':isSoon?'#FFF0E6':'var(--bg)')+';border:1.5px solid '+(isToday?'var(--a)':isSoon?'var(--p)':'var(--br)')});
        var av=el('div',{class:'ch-av',style:'background:'+childColor(c.id)+';width:38px;height:38px;font-size:13px;flex-shrink:0'});
        av.textContent=initials(c.name);
        var info=el('div',{style:'flex:1'});
        info.innerHTML='<div style="font-weight:800;font-size:14px">'+c.name+'</div>'+
          '<div style="font-size:12px;color:var(--lt)">'+d+'. '+MONTHS[m-1].toLowerCase()+' · '+c.group+' · kończy '+age+' lat'+(age===1?'o':age<5?'a':'')+'</div>';
        var badge=el('div',{style:'flex-shrink:0;text-align:right'});
        if(isToday)badge.innerHTML='<div style="font-size:22px">🎉</div><div style="font-size:10px;font-weight:800;color:var(--a)">Dziś!</div>';
        else if(isSoon)badge.innerHTML='<div style="font-size:18px">🎈</div><div style="font-size:10px;font-weight:800;color:var(--p)">Za '+diff+' dni</div>';
        else badge.innerHTML='<div style="font-size:12px;color:var(--lt)">za '+diff+' dni</div>';
        row.appendChild(av);row.appendChild(info);row.appendChild(badge);
        mcard.appendChild(row);
      });
    });
    main.appendChild(mcard);
  });
  var noDob=S.children.filter(function(c){return !c.dob;});
  if(noDob.length){
    var warn=el('div',{class:'card',style:'border-color:var(--a);border-width:2px'});
    warn.appendChild(el('div',{style:'font-weight:800;font-size:13px;color:var(--a);margin-bottom:8px'},'⚠️ Brak daty urodzenia ('+noDob.length+' dzieci)'));
    noDob.forEach(function(c){warn.appendChild(el('div',{style:'font-size:13px;padding:4px 0;border-bottom:1px solid var(--br)'},c.name+' · '+c.group));});
    main.appendChild(warn);
  }
}

// ── OBŁOŻENIE / FREKWENCJA ────────────────────────────────────────────────────
function renderOccupancy(main){
  main.appendChild(el('div',{class:'section-title'},'📊 Obłożenie żłobka'));

  var now = new Date();
  var MONTHS = ['Styczeń','Luty','Marzec','Kwiecień','Maj','Czerwiec',
                'Lipiec','Sierpień','Wrzesień','Październik','Listopad','Grudzień'];

  // Capacity settings card (admin only)
  if(isAdmin()){
  var capCard = el('div',{class:'card'});
  capCard.appendChild(el('div',{style:'font-weight:800;font-size:14px;margin-bottom:12px'},'⚙️ Pojemność grup'));
  var capRow = el('div',{style:'display:flex;gap:12px;flex-wrap:wrap'});
  ['Grupa 1','Grupa 2'].forEach(function(grp){
    var cap = (S.capacity&&S.capacity[grp]) || 15;
    var w = el('div',{style:'flex:1;min-width:120px'});
    w.appendChild(el('div',{style:'font-size:12px;color:var(--lt);font-weight:700;margin-bottom:4px'},grp));
    var input = el('input',{class:'fi',type:'number',style:'margin-bottom:0'});
    input.value = cap;
    input.min = 1; input.max = 50;
    input.onchange = function(){
      var newCap = Object.assign({},S.capacity||{});
      newCap[grp] = parseInt(input.value)||cap;
      setState({capacity:newCap});
      render();
    };
    w.appendChild(input);
    capRow.appendChild(w);
  });
  capCard.appendChild(capRow);
  main.appendChild(capCard);
  }

  // Helper: is child active in a given month?
  function isActiveInMonth(child, year, month){
    var hist = (S.childHistory&&S.childHistory[child.id])||[];
    // Find join date: first 'przyjęcie' or joinDate on child
    var joinStr = child.joinDate || '';
    var endStr = child.endDate || '';
    // Override with history events
    var accepts = hist.filter(function(e){return e.type==='przyjęcie'||e.type==='powrót';});
    var leaves = hist.filter(function(e){return e.type==='odejście';});
    if(accepts.length) joinStr = accepts.sort(function(a,b){return a.date.localeCompare(b.date);})[0].date;
    if(leaves.length) endStr = leaves.sort(function(a,b){return b.date.localeCompare(a.date);})[0].date;
    // If no history at all - treat as active now (legacy children)
    if(!joinStr && !endStr && !hist.length) return true;
    // Check if this month overlaps with [joinStr, endStr]
    var monthStart = year+'-'+String(month).padStart(2,'0')+'-01';
    var monthEnd = year+'-'+String(month).padStart(2,'0')+'-31';
    if(joinStr && joinStr > monthEnd) return false;
    if(endStr && endStr < monthStart) return false;
    return true;
  }

  // Show 12 months (current month back 3 + forward 8)
  var months = [];
  for(var i=-3; i<=8; i++){
    var d = new Date(now.getFullYear(), now.getMonth()+i, 1);
    months.push({year:d.getFullYear(), month:d.getMonth()+1, label:MONTHS[d.getMonth()]+' '+d.getFullYear()});
  }

  // Summary stats for current month
  var curYear = now.getFullYear(), curMonth = now.getMonth()+1;
  var totalCap = ((S.capacity&&S.capacity['Grupa 1'])||15) + ((S.capacity&&S.capacity['Grupa 2'])||12);
  var totalActive = S.children.filter(function(c){return isActiveInMonth(c,curYear,curMonth);}).length;
  var totalFree = Math.max(0, totalCap - totalActive);

  var summaryRow = el('div',{style:'display:flex;gap:10px;margin-bottom:18px'});
  function statBox(num, lbl, color){
    var b = el('div',{class:'stat-card',style:'flex:1'});
    b.innerHTML='<div class="stat-num" style="color:'+color+'">'+num+'</div><div class="stat-lbl">'+lbl+'</div>';
    return b;
  }
  summaryRow.appendChild(statBox(totalActive,'Dzieci w tym miesiącu','var(--p)'));
  summaryRow.appendChild(statBox(totalFree,'Wolnych miejsc',totalFree>0?'var(--g)':'var(--r)'));
  summaryRow.appendChild(statBox(totalCap,'Pojemność łącznie','var(--lt)'));
  main.appendChild(summaryRow);

  // Monthly table
  var tableCard = el('div',{class:'card',style:'overflow-x:auto'});
  tableCard.appendChild(el('div',{style:'font-weight:800;font-size:14px;margin-bottom:14px'},'📅 Obłożenie miesięczne'));

  var table = el('table',{style:'width:100%;border-collapse:collapse;font-size:13px'});

  // Header
  var thead = el('thead',{});
  var hrow = el('tr',{});
  ['Miesiąc','Gr. 1','Gr. 2','Łącznie','Wolne'].forEach(function(h){
    var th = el('th',{style:'padding:8px 6px;text-align:center;font-weight:800;font-size:11px;color:var(--lt);border-bottom:2px solid var(--br);white-space:nowrap'});
    th.textContent = h;
    if(h==='Miesiąc') th.style.textAlign='left';
    hrow.appendChild(th);
  });
  thead.appendChild(hrow);
  table.appendChild(thead);

  var tbody = el('tbody',{});
  months.forEach(function(m){
    var isCurrent = m.year===curYear && m.month===curMonth;
    var cap1 = (S.capacity&&S.capacity['Grupa 1'])||26;
    var cap2 = (S.capacity&&S.capacity['Grupa 2'])||17;
    var totalCapRow = cap1+cap2;
    var active1 = S.children.filter(function(c){return c.group==='Grupa 1'&&isActiveInMonth(c,m.year,m.month);}).length;
    var active2 = S.children.filter(function(c){return c.group==='Grupa 2'&&isActiveInMonth(c,m.year,m.month);}).length;
    var activeTotal = active1+active2;
    var free = Math.max(0, totalCapRow-activeTotal);
    var pct = Math.round((activeTotal/totalCapRow)*100);
    var pctColor = pct>=90?'var(--r)':pct>=70?'var(--a)':'var(--g)';

    var tr = el('tr',{style:'background:'+(isCurrent?'#FFF0E6':'')});
    function td(val, bold, color){
      var t=el('td',{style:'padding:9px 6px;text-align:center;border-bottom:1px solid var(--br)'+(bold?';font-weight:800':'')+(color?';color:'+color:'')});
      t.textContent=val; return t;
    }
    var monthTd = el('td',{style:'padding:9px 6px;border-bottom:1px solid var(--br);font-weight:'+(isCurrent?'800':'600')+(isCurrent?';color:var(--p)':'')});
    monthTd.textContent = m.label+(isCurrent?' ◀':'');
    tr.appendChild(monthTd);
    tr.appendChild(td(active1+'/'+cap1, false, active1>=cap1?'var(--r)':''));
    tr.appendChild(td(active2+'/'+cap2, false, active2>=cap2?'var(--r)':''));
    tr.appendChild(td(activeTotal, true));
    tr.appendChild(td(free, true, free===0?'var(--r)':free<=2?'var(--a)':'var(--g)'));

    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  tableCard.appendChild(table);
  main.appendChild(tableCard);

  // Per-group detail for current month
  var detailCard = el('div',{class:'card'});
  detailCard.appendChild(el('div',{style:'font-weight:800;font-size:14px;margin-bottom:14px'},'👶 Dzieci w bieżącym miesiącu ('+MONTHS[curMonth-1]+')'));
  ['Grupa 1','Grupa 2'].forEach(function(grp){
    var cap = (S.capacity&&S.capacity[grp])||(grp==='Grupa 1'?26:17);
    var kids = S.children.filter(function(c){return c.group===grp&&isActiveInMonth(c,curYear,curMonth);})
      .sort(function(a,b){return a.name.localeCompare(b.name,'pl');});
    var free = Math.max(0, cap-kids.length);
    var grpHdr = el('div',{style:'display:flex;justify-content:space-between;align-items:center;background:var(--p);color:#fff;border-radius:10px;padding:8px 14px;margin-bottom:8px'});
    grpHdr.innerHTML='<div style="font-weight:900">'+grp+'</div>'+
      '<div style="font-size:13px;opacity:.9">'+kids.length+'/'+cap+' · <span style="color:'+(free===0?'#ffb3b3':'#b3ffcc')+'">'+free+' wolnych</span></div>';
    detailCard.appendChild(grpHdr);
    kids.forEach(function(c){
      var row=el('div',{style:'display:flex;align-items:center;gap:8px;padding:6px 4px;border-bottom:1px solid var(--br);font-size:13px'});
      var av=el('div',{style:'width:28px;height:28px;border-radius:50%;background:'+childColor(c.id)+';display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff;flex-shrink:0'});
      av.textContent=initials(c.name);
      row.appendChild(av);
      row.appendChild(el('div',{style:'flex:1;font-weight:600'},c.name));
      if(c.joinDate)row.appendChild(el('div',{style:'font-size:11px;color:var(--lt)'},'od '+c.joinDate));
      detailCard.appendChild(row);
    });
    // Free slots
    if(free>0){
      var freeRow=el('div',{style:'padding:8px 4px;font-size:12px;color:var(--g);font-weight:700'});
      freeRow.textContent='+ '+free+' wolne '+(free===1?'miejsce':free<5?'miejsca':'miejsc');
      detailCard.appendChild(freeRow);
    }
    detailCard.appendChild(el('div',{style:'height:10px'}));
  });
  main.appendChild(detailCard);
}


// ── TERMINY ───────────────────────────────────────────────────────────────────
function renderTerminy(main){
  main.appendChild(el('div',{class:'section-title'},'📅 Terminy formularzy'));
  var now=new Date();
  var TYPES=[
    {key:'obs',label:'Obserwacje dzieci'},
    {key:'selfEval',label:'Samoocena pracownika'},
    {key:'criteria',label:'Ocena kryteriów'},
    {key:'diagnosis',label:'Diagnoza obszarów'}
  ];
  var allDl=[];
  TYPES.forEach(function(t){
    ((S.deadlines&&S.deadlines[t.key])||[]).forEach(function(dl){
      allDl.push(Object.assign({},dl,{type:t.key,typeLbl:t.label}));
    });
  });
  // Filter for current user if not admin
  var visible=allDl.filter(function(dl){
    if(!isAdmin()&&dl.type==='obs'&&dl.groupTarget&&dl.groupTarget!==S.currentUser.group)return false;
    return true;
  });
  if(!visible.length){
    main.appendChild(el('div',{class:'card'},'Brak zaplanowanych terminów.'));
    if(isAdmin()) renderAdminTerminy(main);
    return;
  }
  // Group by status
  var overdue=[],soon=[],upcoming=[],future=[];
  visible.forEach(function(dl){
    if(!dl.date)return;
    var d=new Date(dl.date);
    var diff=Math.ceil((d-now)/(1000*60*60*24));
    if(diff<0) overdue.push(dl);
    else if(diff<=7) soon.push(dl);
    else if(diff<=30) upcoming.push(dl);
    else future.push(dl);
  });
  function renderBucket(list,label,color,icon){
    if(!list.length)return;
    var card=el('div',{class:'card',style:'border-left:4px solid '+color});
    card.appendChild(el('div',{style:'font-weight:800;font-size:13px;color:'+color+';margin-bottom:10px'},icon+' '+label));
    list.forEach(function(dl){
      var d=new Date(dl.date);
      var diff=Math.ceil((d-now)/(1000*60*60*24));
      var txt=diff<0?'Przekroczono o '+Math.abs(diff)+' dni':diff===0?'Dziś!':'Za '+diff+' dni';
      var row=el('div',{style:'display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--br)'});
      row.innerHTML='<div><div style="font-weight:700;font-size:13px">'+dl.label+'</div>'+
        '<div style="font-size:11px;color:var(--lt)">'+dl.typeLbl+(dl.groupTarget?' · '+dl.groupTarget:'')+'</div></div>'+
        '<div style="text-align:right"><div style="font-weight:800;font-size:12px;color:'+color+'">'+txt+'</div>'+
        '<div style="font-size:11px;color:var(--lt)">'+dl.date+'</div></div>';
      card.appendChild(row);
    });
    main.appendChild(card);
  }
  renderBucket(overdue,'Przekroczone','var(--r)','🔴');
  renderBucket(soon,'Wkrótce (7 dni)','var(--a)','🟡');
  renderBucket(upcoming,'W tym miesiącu (30 dni)','var(--p)','🔵');
  renderBucket(future,'Przyszłe','var(--lt)','⚪');
  if(isAdmin()) renderAdminTerminy(main);
}

  typeWrap.appendChild(el('label',{class:'fl'},'Rodzaj'));
  var typeSel=el('select',{class:'fs'});
  TYPES.forEach(function(t){var o=el('option',{value:t.key},t.label);typeSel.appendChild(o);});
  typeSel.onchange=function(){nf.type=typeSel.value;};
  typeWrap.appendChild(typeSel);adminCard.appendChild(typeWrap);
  var grpWrap=el('div',{class:'fg'});
  grpWrap.appendChild(el('label',{class:'fl'},'Grupa (opcjonalnie)'));
  var grpSel=el('select',{class:'fs'});
  [['','Obie grupy'],['Grupa 1','Grupa 1'],['Grupa 2','Grupa 2']].forEach(function(g){
    var o=el('option',{value:g[0]},g[1]);grpSel.appendChild(o);
  });
  grpSel.onchange=function(){nf.groupTarget=grpSel.value;};
  grpWrap.appendChild(grpSel);adminCard.appendChild(grpWrap);
  adminCard.appendChild(btn('➕ Dodaj termin','btn-p',function(){
    if(!nf.label.trim()||!nf.date){showToast('Wypełnij nazwę i datę');return;}
    var entry={id:uid(),label:nf.label,date:nf.date,groupTarget:nf.groupTarget};
    var nd=Object.assign({},S.deadlines||{});
    nd[nf.type]=(nd[nf.type]||[]).concat([entry]);
    setState({deadlines:nd});
    logChange('Dodano termin: '+nf.label);showToast('Termin dodany');render();
  }));
  main.appendChild(adminCard);
  // List existing
  TYPES.forEach(function(type){
    var list=(S.deadlines&&S.deadlines[type.key])||[];
    if(!list.length)return;
    var lCard=el('div',{class:'card',style:'margin-top:10px'});
    lCard.appendChild(el('div',{style:'font-weight:800;font-size:13px;margin-bottom:10px'},type.label));
    list.forEach(function(dl,i){
      var row=el('div',{style:'display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--br)'});
      row.innerHTML='<div><div style="font-size:13px;font-weight:700">'+dl.label+'</div>'+
        '<div style="font-size:11px;color:var(--lt)">'+dl.date+(dl.groupTarget?' · '+dl.groupTarget:'')+'</div></div>';
      var db=el('button',{style:'background:#FFF0F2;border:1px solid var(--r);color:var(--r);border-radius:8px;padding:4px 8px;font-size:11px;font-weight:700;cursor:pointer'},'🗑️');
      db.onclick=function(){
        confirmDelete('Usunąć ten termin?',function(){
          var nd=Object.assign({},S.deadlines||{});
          nd[type.key]=(nd[type.key]||[]).filter(function(_,j){return j!==i;});
          setState({deadlines:nd});
          showToast('Usunięto');render();
        });
      };
      row.appendChild(db);lCard.appendChild(row);
    });
    main.appendChild(lCard);
  });
}


// ── STATE SAFETY ─────────────────────────────────────────────────────────────
function ensureStateFields(){
  if(!S.observations)S.observations={};
  if(!S.healthLog)S.healthLog={};
  if(!S.behaviorLog)S.behaviorLog={};
  if(!S.accidents)S.accidents={};
  if(!S.dailyLogs)S.dailyLogs={};
  if(!S.employeeEvals)S.employeeEvals={};
  if(!S.employeeDiagnosis)S.employeeDiagnosis={};
  if(!S.notifications)S.notifications=[];
  if(!S.changeLog)S.changeLog=[];
  if(!S.pickupLog)S.pickupLog={};
  if(!S.childHistory)S.childHistory={};
  if(!S.childNotes)S.childNotes={};
  if(!S.photoConsent)S.photoConsent={};
  if(!S.groupNotes)S.groupNotes={};
  if(!S.capacity)S.capacity={'Grupa 1':26,'Grupa 2':17};
  if(!S.deadlines)S.deadlines={obs:[],selfEval:[],criteria:[],diagnosis:[]};
  if(!S.groups)S.groups=['Grupa 1','Grupa 2'];
}
// ── BOOT ──────────────────────────────────────────────────────────────────────
function applyRemote(remote){
  var cu=S.currentUser;
  S=Object.assign({},remote,{currentUser:cu});
  ensureStateFields();
  var bi=INIT_USERS.map(function(u){return u.id;});
  S.users=INIT_USERS.concat((S.users||[]).filter(function(u){return !bi.includes(u.id);}));
  if(!S.children||S.children.length===0){S.children=INIT_CHILDREN.slice();}
  else{S.children=S.children.map(function(e){var f=INIT_CHILDREN.find(function(c){return c.id===e.id;});return f?Object.assign({},e,{pesel:f.pesel||e.pesel,dob:f.dob||e.dob}):e;});}
  saveLocal(S);
}

function boot(){
  // Replace loading placeholder with real logo
  var loadingLogo=document.getElementById('loading-logo');
  if(loadingLogo&&typeof LOGO!=='undefined'){
    var img=document.createElement('img');
    img.src=LOGO; img.style.cssText='height:90px;width:auto;border-radius:20px';
    loadingLogo.innerHTML=''; loadingLogo.appendChild(img);
  }
  try{var local=load();if(local){S=local;ensureStateFields();}}catch(e){console.warn('Local load:',e);}
  initSupabase();
  function doRender(){try{render();}catch(e){
    console.error('Render error:',e);
    var app=document.getElementById('app');
    if(app)app.innerHTML='<div style="padding:20px;color:red;font-family:sans-serif">Błąd: '+e.message+'<br><br><button onclick="location.reload()" style="padding:8px 16px;font-size:14px">Odśwież stronę</button></div>';
  }}
  if(sb){
    loadFromSupabase().then(function(remote){
      if(remote){applyRemote(remote);}
      else{save(S);}
      try{subscribeRealtime();}catch(e){console.warn('Realtime:',e);}
      doRender();
    }).catch(function(e){
      console.warn('Supabase failed:',e);
      ensureStateFields();
      doRender();
    });
  }else{ensureStateFields();doRender();}
}
window.addEventListener('error',function(e){
  console.error('Global error:',e.message);
  var app=document.getElementById('app');
  if(app&&!app.textContent.trim()){app.innerHTML='<div style="padding:20px;color:red;font-family:sans-serif">Błąd: '+e.message+'<br><button onclick="location.reload()" style="margin-top:10px;padding:8px 16px">Odśwież</button></div>';}
});
var _bootCalled=false;
function safeBoot(){
  if(_bootCalled)return;
  _bootCalled=true;
  try{boot();}catch(e){
    console.error('Boot failed:',e);
    var app=document.getElementById('app');
    if(app)app.innerHTML='<div style="padding:20px;text-align:center;font-family:sans-serif"><div style="font-size:48px;margin-bottom:16px">🌈</div><div style="font-weight:800;font-size:18px;color:#D4845A;margin-bottom:8px">Tęczowy Domek</div><div style="color:red;font-size:13px;margin-bottom:16px">Błąd: '+e.message+'</div><button onclick="location.reload()" style="padding:10px 20px;font-size:14px;font-weight:700;border:none;border-radius:10px;background:#D4845A;color:#fff;cursor:pointer">Spróbuj ponownie</button></div>';
  }
}
// Timeout - boot without Supabase after 6 seconds
var _sbTimeout=setTimeout(function(){
  console.warn('Supabase CDN timeout - booting offline');
  safeBoot();
},6000);
var sbScript=document.createElement('script');
sbScript.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
sbScript.onload=function(){clearTimeout(_sbTimeout);safeBoot();};
sbScript.onerror=function(){clearTimeout(_sbTimeout);console.warn('Supabase CDN failed');safeBoot();};
document.head.appendChild(sbScript);
</script>
<div id="del-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center;padding:24px">
  <div style="background:#fff;border-radius:20px;padding:24px;max-width:320px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.2)">
    <div style="font-size:36px;margin-bottom:10px">🗑️</div>
    <div id="del-modal-msg" style="font-size:14px;font-weight:700;margin-bottom:18px;color:#3D2C2C">Czy na pewno usunąć?</div>
    <div style="display:flex;gap:10px">
      <button style="flex:1;padding:11px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;background:#F5EDE8;color:#9B8A84;font-family:inherit" onclick="closeDelModal()">Anuluj</button>
      <button id="del-modal-ok" style="flex:1;padding:11px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;background:#E05454;color:#fff;font-family:inherit">Usuń</button>
    </div>
  </div>
</div>

<script>

function confirmDelete(msg,onYes){
  document.getElementById('del-modal-msg').textContent=msg;
  var m=document.getElementById('del-modal');
  m.style.display='flex';
  document.getElementById('del-modal-ok').onclick=function(){m.style.display='none';onYes();};
}
function closeDelModal(){document.getElementById('del-modal').style.display='none';}


var _addChildForm = {name:'',pesel:'',dob:'',group:'Grupa 1',joinDate:'',endDate:'',note:''};

function showAddChildModal(){
  _addChildForm = {
    name:'', pesel:'', dob:'', 
    group: (window.S&&S.currentUser&&S.currentUser.group)||'Grupa 1',
    joinDate: today(), endDate:'', note:''
  };
  renderAddChildForm();
  document.getElementById('add-child-modal').style.display='flex';
  _attachAddChildHandlers();
}

function renderAddChildForm(){
  var f = _addChildForm;
  var container = document.getElementById('add-child-form');
  container.innerHTML = '';

  function field(label, key, type, placeholder){
    var wrap = document.createElement('div');
    wrap.style.marginBottom='12px';
    var lbl = document.createElement('label');
    lbl.style.cssText='display:block;font-size:12px;font-weight:700;color:#9B8A84;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px';
    lbl.textContent = label;
    var inp = document.createElement('input');
    inp.style.cssText='width:100%;padding:10px 12px;border:2px solid #EDE0D8;border-radius:10px;font-size:14px;font-family:inherit;background:#FFFAF7;box-sizing:border-box';
    inp.type = type||'text';
    inp.value = f[key]||'';
    if(placeholder) inp.placeholder = placeholder;
    inp.oninput = function(){
      f[key]=inp.value;
      // Auto-fill DOB from PESEL
      if(key==='pesel'&&inp.value.length>=6){
        try{
          var p=inp.value,yy=parseInt(p.slice(0,2)),mm=parseInt(p.slice(2,4)),dd=parseInt(p.slice(4,6)),yr,rm=mm;
          if(mm>=21&&mm<=32){rm=mm-20;yr=2000+yy;}else if(mm>=1&&mm<=12){rm=mm;yr=1900+yy;}
          if(yr){f.dob=yr+'-'+String(rm).padStart(2,'0')+'-'+String(dd).padStart(2,'0');renderAddChildForm();}
        }catch(e){}
      }
    };
    wrap.appendChild(lbl);wrap.appendChild(inp);
    return wrap;
  }

  container.appendChild(field('Imię i nazwisko','name','text','np. Jan Kowalski'));
  container.appendChild(field('PESEL','pesel','text','11 cyfr — DOB wypełni się automatycznie'));
  container.appendChild(field('Data urodzenia','dob','date'));

  // Group select (admin sees both)
  var gWrap = document.createElement('div');
  gWrap.style.marginBottom='12px';
  var gLbl = document.createElement('label');
  gLbl.style.cssText='display:block;font-size:12px;font-weight:700;color:#9B8A84;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px';
  gLbl.textContent='Grupa';
  var gSel = document.createElement('select');
  gSel.style.cssText='width:100%;padding:10px 12px;border:2px solid #EDE0D8;border-radius:10px;font-size:14px;font-family:inherit;background:#FFFAF7';
  var groups = (window.S&&S.currentUser&&S.currentUser.role==='admin')?['Grupa 1','Grupa 2']:[S.currentUser.group];
  groups.forEach(function(g){var o=document.createElement('option');o.value=g;o.textContent=g;if(g===f.group)o.selected=true;gSel.appendChild(o);});
  gSel.onchange=function(){f.group=gSel.value;};
  gWrap.appendChild(gLbl);gWrap.appendChild(gSel);
  container.appendChild(gWrap);

  // Separator
  var sep = document.createElement('div');
  sep.style.cssText='font-size:12px;font-weight:700;color:var(--p);margin:14px 0 8px;text-transform:uppercase;letter-spacing:.5px;border-top:1px solid #EDE0D8;padding-top:12px';
  sep.textContent='📅 Okres pobytu';
  container.appendChild(sep);

  container.appendChild(field('Data przyjęcia (od)','joinDate','date'));
  container.appendChild(field('Data zakończenia (do, opcjonalnie)','endDate','date'));
  container.appendChild(field('Notatka (opcjonalnie)','note','text','np. przeniesienie z innej placówki'));
}

function closeAddChildModal(){
  document.getElementById('add-child-modal').style.display='none';
}

// Attach button handlers when modal is opened
function _attachAddChildHandlers(){
  var cancelBtn=document.getElementById('add-child-cancel');
  var saveBtn=document.getElementById('add-child-save');
  if(cancelBtn) cancelBtn.onclick=closeAddChildModal;
  if(saveBtn) saveBtn.onclick=function(){
  var f = _addChildForm;
  if(!f.name.trim()){alert('Wpisz imię i nazwisko');return;}
  var child = {
    id:uid(), name:f.name.trim(), dob:f.dob, group:f.group,
    pesel:f.pesel, joinDate:f.joinDate, endDate:f.endDate,
    address:'', motherName:'', motherPhone:'',
    fatherName:'', fatherPhone:'', allergies:'',
    chronicDiseases:'', permanentMeds:'', extraInfo:''
  };
  setState({children:S.children.concat([child])});
  // Auto-create first history entry
  if(f.joinDate){
    var hist = (S.childHistory[child.id]||[]).concat([{
      id:uid(), date:f.joinDate, type:'przyjęcie',
      group:f.group, note:f.note||'', author:S.currentUser.name
    }]);
    setLog('childHistory',child.id,hist);
  }
  if(f.endDate){
    var hist2 = (S.childHistory[child.id]||[]).concat([{
      id:uid(), date:f.endDate, type:'odejście',
      group:f.group, note:f.note||'', author:S.currentUser.name
    }]);
    setLog('childHistory',child.id,hist2);
  }
  logChange('Dodano dziecko: '+f.name);
  showToast('Dodano: '+f.name);
  closeAddChildModal();
  render();
  };
}

</script>
</body>
